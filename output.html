<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Light Mapper — Output</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        cursor: none;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      .output-stage {
        width: 100%;
        height: 100%;
        position: relative;
        background: #000;
      }
      .output-stage canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .output-hud {
        position: fixed;
        left: 12px;
        bottom: 12px;
        z-index: 2;
        display: flex;
        gap: 8px;
        opacity: 0;
        transition: opacity 160ms ease;
        cursor: default;
      }
      body.show-hud {
        cursor: default;
      }
      body.show-hud .output-hud {
        opacity: 1;
      }
      .output-hud button {
        font: 13px/1.2 system-ui, sans-serif;
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #3a465c;
        background: rgba(20, 24, 32, 0.85);
        color: #e8ecf1;
        cursor: pointer;
      }
      .output-status {
        position: fixed;
        top: 12px;
        left: 12px;
        color: #9aa3b2;
        font: 12px/1.3 system-ui, sans-serif;
        opacity: 0;
        transition: opacity 160ms ease;
        pointer-events: none;
      }
      body.show-hud .output-status {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/outputMain.ts"></script>
  </body>
</html>
